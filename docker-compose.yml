# Imágenes con etiqueta fija + pull_policy evitan cambios silenciosos al cada `up`.
# `build.pull: false` evita que cada build vuelva a bajar la base `FROM` del Dockerfile.
name: nodealparquear

services:
  api:
    build:
      context: .
      pull: false
    image: nodealparquear-api:local
    container_name: nodealparquear_api
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      # En el contenedor, localhost es el propio contenedor. Postgres en el host: host.docker.internal (extra_hosts abajo).
      # Si definís DATABASE_URL_DOCKER en .env, Compose usa esa; si no, usa DATABASE_URL (p. ej. npm run start:dev en el host).
      DATABASE_URL: ${DATABASE_URL_DOCKER:-${DATABASE_URL}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v2.55.1
    pull_policy: if_not_present
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.4.2
    pull_policy: if_not_present
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=telodijecomma
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
